<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlHTA Comunitario</title>

<link rel="icon" href="UNAD.ico" type="image/x-icon">
<link rel="stylesheet" href="./estilos.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo-container">
<img src="UNAD.png" alt="Logo UNAD">
<div>
<h1>ControlHTA <span>Comunitario</span></h1>
<p>Sistema Digital de Monitoreo de Hipertensión</p>
</div>
</div>

</header>

<!-- DASHBOARD -->

<section class="cards">

<div class="card">
<h3>👥 Pacientes</h3>
<p id="totalPacientes">0</p>
</div>

<div class="card normal-card">
<h3>🟢 Normales</h3>
<p id="normales">0</p>
</div>

<div class="card alta-card">
<h3>🔴 Altos</h3>
<p id="altos">0</p>
</div>

<div class="card baja-card">
<h3>🟠 Bajos</h3>
<p id="bajos">0</p>
</div>

</section>

<!-- CONTENIDO -->

<div class="contenido">

<h2>🩺 Registro de Pacientes</h2>
  
  <button class="pdf-btn" onclick="descargarPDF()">
📄 Descargar Reporte
</button>

<div class="formulario">

<input type="text" id="nombre" placeholder="Nombre del paciente">

<input type="number" id="sistolica" placeholder="Presión Sistólica">

<input type="number" id="diastolica" placeholder="Presión Diastólica">

<button onclick="registrar()">Registrar Paciente</button>

</div>

<!-- ALERTA -->

<div id="alerta"></div>

<h2>📊 Historial Clínico</h2>

<table>

<thead>
<tr>
<th>Paciente</th>
<th>Presión</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<!-- FOOTER -->

<footer class="footer">

<p>
© 2026 UNAD | Proyecto Comunitario HTA
</p>

<p>
Desarrollado por: Manuel Ricardo Chamorro Ruano
</p>

</footer>

<script src="./script.js"></script>

</body>
</html>
